<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Urban Bite</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>
<!-- NAVBAR -->

<header class="navbar">

<div class="logo">Urban Bite</div>

<nav>

<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('menu') }}">Menu</a>
<a href="{{ url_for('order') }}">Orders</a>
<a href="{{ url_for('about') }}">About</a>
<a href="{{ url_for('contact') }}">Contact</a>
<a href="{{ url_for('login') }}">Login</a>

</nav>

</header>


<section class="hero">

<div class="hero-content">

<h2>Create Account</h2>

<form style="display:flex;flex-direction:column;gap:15px;">

<input id="name" type="text" placeholder="Full Name" style="padding:12px;border:none;border-radius:8px;">

<input id="email" type="email" placeholder="Email" style="padding:12px;border:none;border-radius:8px;">

<input id="password" type="password" placeholder="Password" style="padding:12px;border:none;border-radius:8px;">

<input id="phone" type="text" placeholder="Phone Number" style="padding:12px;border:none;border-radius:8px;">

<button type="button" onclick="registerUser()">Register</button>

</form>
</div>

</section>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
